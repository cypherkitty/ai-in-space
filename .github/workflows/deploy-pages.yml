name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check Svelte and TypeScript
        run: npm run check
      - name: Audit slogan distance
        run: npm run audit:slogans
      - name: Audit exposure and contrast
        run: npm run audit:exposure
      - name: Build
        run: npm run build
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Upload Cloudflare Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-cloudflare:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Detect Cloudflare token
        id: cf
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "CLOUDFLARE_API_TOKEN not set; skipping production Cloudflare Pages deploy."
          fi
      - name: Download site dist
        if: steps.cf.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist
      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.enabled == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 8a84df74d5bcf7b212980e6f51979731
          command: pages deploy dist --project-name ai-in-space
